<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.7.0/dist/aframe-extras.min.js"></script>
  </head>
  <body>
    <a-scene xr-mode-ui="XRMode: xr">
      <a-assets>
        <img id="azulejo" src="suelo_piedra.jpg">
        <img id="fondo" src="fondo.jpg">
      </a-assets>
      <a-box position="-1 0.5 -3" rotation="0 45 0" color="#4CC3D9"></a-box>
      <a-box position="-3 0.5 -3" rotation="0 45 0" color="#4CC3D9"></a-box>
      <a-sphere position="0 1.25 -5" radius="1.25" color="#EF2D5E"></a-sphere>
      <a-cylinder position="1 0.75 -3" radius="0.5" height="1.5" color="#FFC65D"></a-cylinder>
      <a-cone position="0 4 -3" color="red"></a-cone>
      <a-triangle position="-2 2,5 -2" color="yellow"></a-triangle>
      <a-plane position="0 0 -4" rotation="-90 0 0" width="4" height="4" color="#7BC8A4" src="#azulejo"></a-plane>
      <a-sky hide-on-enter-al src="#fondo"></a-sky>
      <a-entity movement-controls="fly: true" position="5 1.6 0" rotation="0 0 0">
       <a-camera wasd-controls="acceleration:100; fly: true" look-controls ></a-camera>
       <a-entity oculus-touch-controls="hand: right"></a-entity>  
       <a-entity oculus-touch-controls="hand: left"></a-entity>  
      </a-entity>
    </a-scene>
  </body>
</html>
